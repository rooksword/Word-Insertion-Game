<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Insertion Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Word Insertion Game</h1>

  <section class="display">
    <div class="time-left" id="timeLeftWrap" aria-hidden="true">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="time-left-text" id="timeLeftText"></p>
    </div>
    <p class="word placeholder" id="word" aria-live="polite" data-placeholder="—">—</p>
    <p class="status" id="status"></p>
  </section>

  <section class="controls">
      <div class="field">
        <span class="label">Timer</span>
        <div class="timer-inputs">
          <input type="number" id="timerMinutes" min="0" value="2" aria-label="Minutes">
          <span class="timer-sep">:</span>
          <input type="number" id="timerSeconds" min="0" max="59" value="0" aria-label="Seconds">
        </div>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="showImmediately" checked> Show word immediately
        </label>
      </div>

      <div class="field">
        <span class="label">Word types</span>
        <div class="word-type-buttons">
          <button type="button" class="word-type common active" id="common" data-type="common">Common</button>
          <button type="button" class="word-type uncommon active" id="uncommon" data-type="uncommon">Uncommon</button>
          <button type="button" class="word-type rare" id="rare" data-type="rare">Rare</button>
        </div>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="infinite" checked> Repeat infinitely
        </label>
      </div>
      <div class="field repeat-times hidden" id="repeat-times-wrap">
        <label for="repeatCount">Repeat times</label>
        <input type="number" id="repeatCount" min="1" value="5">
      </div>

      <div class="actions">
        <button type="button" id="toggle">Start</button>
      </div>
    </section>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
