<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Insert random words into your flow—pick by frequency and part of speech.">
  <title>Word Insertion Game</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Word Insertion Game</h1>

  <section class="display">
    <div class="time-left" id="timeLeftWrap" aria-hidden="true">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <p class="time-left-text" id="timeLeftText"></p>
    </div>
    <p class="word placeholder" id="word" aria-live="polite" data-placeholder="—">—</p>
    <p class="status" id="status"></p>
  </section>

  <section class="controls">
      <div class="field">
        <span class="label">Timer</span>
        <div class="timer-inputs">
          <input type="number" id="timerMinutes" min="0" value="2" aria-label="Minutes">
          <span class="timer-sep">:</span>
          <input type="number" id="timerSeconds" min="0" max="59" value="0" aria-label="Seconds">
        </div>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="showImmediately" checked> Show word immediately
        </label>
      </div>

      <div class="field">
        <span class="label">Word types</span>
        <div class="word-type-buttons">
          <button type="button" class="word-type common active" id="common" data-type="common">Common</button>
          <button type="button" class="word-type uncommon active" id="uncommon" data-type="uncommon">Uncommon</button>
          <button type="button" class="word-type rare" id="rare" data-type="rare">Rare</button>
        </div>
      </div>

      <div class="field">
        <details class="pos-dropdown">
          <summary class="pos-dropdown-summary">Parts of speech</summary>
          <div class="pos-checkboxes">
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo CC" data-tags="CC">S</button><label><input type="checkbox" data-tags="CC"> CC <span class="tag-example">and, but, or</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo CD" data-tags="CD">S</button><label><input type="checkbox" data-tags="CD"> CD <span class="tag-example">one, two</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo DT" data-tags="DT">S</button><label><input type="checkbox" data-tags="DT"> DT <span class="tag-example">the, some</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo EX" data-tags="EX">S</button><label><input type="checkbox" data-tags="EX"> EX <span class="tag-example">there</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo FW" data-tags="FW">S</button><label><input type="checkbox" data-tags="FW"> FW <span class="tag-example">e.g. mon dieu</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo IN" data-tags="IN">S</button><label><input type="checkbox" data-tags="IN"> IN <span class="tag-example">of, in, by</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo JJ" data-tags="JJ">S</button><label><input type="checkbox" data-tags="JJ"> JJ <span class="tag-example">big</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo JJR" data-tags="JJR">S</button><label><input type="checkbox" data-tags="JJR"> JJR <span class="tag-example">bigger</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo JJS" data-tags="JJS">S</button><label><input type="checkbox" data-tags="JJS"> JJS <span class="tag-example">biggest</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo LS" data-tags="LS">S</button><label><input type="checkbox" data-tags="LS"> LS <span class="tag-example">1, One</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo MD" data-tags="MD">S</button><label><input type="checkbox" data-tags="MD"> MD <span class="tag-example">can, should</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo NN" data-tags="NN">S</button><label><input type="checkbox" data-tags="NN" checked> NN <span class="tag-example">dog</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo NNP" data-tags="NNP">S</button><label><input type="checkbox" data-tags="NNP"> NNP <span class="tag-example">Edinburgh</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo NNPS" data-tags="NNPS">S</button><label><input type="checkbox" data-tags="NNPS"> NNPS <span class="tag-example">Smiths</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo NNS" data-tags="NNS">S</button><label><input type="checkbox" data-tags="NNS" checked> NNS <span class="tag-example">dogs</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo PDT" data-tags="PDT">S</button><label><input type="checkbox" data-tags="PDT"> PDT <span class="tag-example">all, both</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo POS" data-tags="POS">S</button><label><input type="checkbox" data-tags="POS"> POS <span class="tag-example">'s</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo PP$" data-tags="PP$">S</button><label><input type="checkbox" data-tags="PP$"> PP$ <span class="tag-example">my, one's</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo PRP" data-tags="PRP">S</button><label><input type="checkbox" data-tags="PRP"> PRP <span class="tag-example">I, you, she</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo RB" data-tags="RB">S</button><label><input type="checkbox" data-tags="RB"> RB <span class="tag-example">quickly</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo RBR" data-tags="RBR">S</button><label><input type="checkbox" data-tags="RBR"> RBR <span class="tag-example">faster</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo RBS" data-tags="RBS">S</button><label><input type="checkbox" data-tags="RBS"> RBS <span class="tag-example">fastest</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo RP" data-tags="RP">S</button><label><input type="checkbox" data-tags="RP"> RP <span class="tag-example">up, off</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo TO" data-tags="TO">S</button><label><input type="checkbox" data-tags="TO"> TO <span class="tag-example">to</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo UH" data-tags="UH">S</button><label><input type="checkbox" data-tags="UH"> UH <span class="tag-example">oh, oops</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo VB" data-tags="VB">S</button><label><input type="checkbox" data-tags="VB" checked> VB <span class="tag-example">eat</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo VBD" data-tags="VBD">S</button><label><input type="checkbox" data-tags="VBD" checked> VBD <span class="tag-example">ate</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo VBG" data-tags="VBG">S</button><label><input type="checkbox" data-tags="VBG" checked> VBG <span class="tag-example">eating</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo VBN" data-tags="VBN">S</button><label><input type="checkbox" data-tags="VBN" checked> VBN <span class="tag-example">eaten</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo VBP" data-tags="VBP">S</button><label><input type="checkbox" data-tags="VBP" checked> VBP <span class="tag-example">eat</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo VBZ" data-tags="VBZ">S</button><label><input type="checkbox" data-tags="VBZ" checked> VBZ <span class="tag-example">eats</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo WDT" data-tags="WDT">S</button><label><input type="checkbox" data-tags="WDT"> WDT <span class="tag-example">which, that</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo WP" data-tags="WP">S</button><label><input type="checkbox" data-tags="WP"> WP <span class="tag-example">who, what</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo WP$" data-tags="WP$">S</button><label><input type="checkbox" data-tags="WP$"> WP$ <span class="tag-example">whose</span></label></div>
            <div class="pos-row"><button type="button" class="solo-btn" aria-label="Solo WRB" data-tags="WRB">S</button><label><input type="checkbox" data-tags="WRB"> WRB <span class="tag-example">how, where</span></label></div>
          </div>
        </details>
      </div>

      <div class="field">
        <label for="minWordLength">Minimum word length</label>
        <input type="number" id="minWordLength" min="1" value="3" aria-label="Minimum word length">
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="infinite" checked> Repeat infinitely
        </label>
      </div>
      <div class="field repeat-times hidden" id="repeat-times-wrap">
        <label for="repeatCount">Repeat times</label>
        <input type="number" id="repeatCount" min="1" value="5">
      </div>

      <div class="actions">
        <button type="button" id="toggle">Start</button>
      </div>
    </section>

  <script src="pos-tagger.js"></script>
  <script src="app.js"></script>
</body>
</html>
